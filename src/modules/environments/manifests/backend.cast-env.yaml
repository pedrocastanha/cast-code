  requireApproval:
    - production_write
    - destructive_command
    - deploy
rag:
  recommendedSources:
    - api-contracts
    - database-schema
    - runbooks
benchmarks:
  smoke:
    - engineering-code-review-smoke
schedules:
  suggested:
    - nightly-test-health
    - weekly-dependency-review
